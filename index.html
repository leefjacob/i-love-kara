<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>When to Visit Kara</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:      #1a1035;
      --deep:     #120c28;
      --magenta:  #c2447a;
      --amber:    #f5a623;
      --coral:    #ff7b5e;
      --sage:     #7ec8a0;
      --cream:    #fdf0e8;
      --muted:    rgba(253,240,232,0.55);

      --cell-blank:  rgba(255,255,255,0.07);
      --cell-green:  #4caf7d;
      --cell-yellow: #f5c842;
      --cell-red:    #e05252;

      --header-h: 80px;
    }

    html, body {
      height: 100%;
      background: var(--sky);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── stars background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 110%, #3d1060 0%, transparent 70%),
        radial-gradient(ellipse 80% 40% at 80% 100%, #8b1a4a33 0%, transparent 60%),
        radial-gradient(ellipse 60% 30% at 20% 95%, #f5a62311 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(18, 12, 40, 0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(194, 68, 122, 0.25);
      display: flex; align-items: center;
      padding: 0 24px; gap: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.45);
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--cream);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .header-title span { color: var(--magenta); }

    .header-divider {
      width: 1px; height: 36px;
      background: rgba(253,240,232,0.15);
      flex-shrink: 0;
    }

    /* name chips */
    .name-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      flex-shrink: 0;
    }
    .name-chips { display: flex; gap: 8px; flex-shrink: 0; }
    .chip {
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.02em;
      border: 1.5px solid rgba(253,240,232,0.18);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      transition: all 0.18s;
      user-select: none;
    }
    .chip:hover { border-color: var(--magenta); color: var(--cream); }
    .chip.active {
      background: var(--magenta);
      border-color: var(--magenta);
      color: #fff;
      box-shadow: 0 0 12px rgba(194,68,122,0.5);
    }

    /* color picker */
    .color-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      flex-shrink: 0;
    }
    .color-opts { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .color-opt {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 18px; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      font-size: 0.8rem; font-weight: 600;
      color: var(--muted);
      transition: all 0.18s;
      user-select: none;
      white-space: nowrap;
    }
    .color-opt .dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .color-opt:hover { border-color: rgba(255,255,255,0.35); color: var(--cream); }
    .color-opt.active {
      border-color: currentColor;
      color: var(--cream);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 10px rgba(255,255,255,0.08);
    }
    .color-opt[data-color="blank"] .dot  { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); }
    .color-opt[data-color="green"] .dot  { background: var(--cell-green); }
    .color-opt[data-color="yellow"] .dot { background: var(--cell-yellow); }
    .color-opt[data-color="red"] .dot    { background: var(--cell-red); }

    .header-spacer { flex: 1; }

    /* progress pill */
    .progress-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0;
    }
    .progress-text { font-size: 0.75rem; color: var(--muted); }
    .progress-bar-track {
      width: 80px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.12); overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--magenta), var(--amber));
      transition: width 0.3s;
    }

    /* submit btn */
    #submit-btn {
      padding: 8px 20px; border-radius: 20px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      border: none;
      background: linear-gradient(135deg, var(--magenta), #8b1a8b);
      color: #fff;
      box-shadow: 0 0 20px rgba(194,68,122,0.4);
      transition: all 0.2s;
      flex-shrink: 0;
      opacity: 0.45;
      cursor: not-allowed;
    }
    #submit-btn.ready {
      opacity: 1; cursor: pointer;
    }
    #submit-btn.ready:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(194,68,122,0.6);
    }

    /* ── CALENDAR AREA ── */
    #calendar-wrap {
      position: fixed;
      top: var(--header-h); left: 0; right: 0; bottom: 0;
      overflow: auto;
      padding: 24px 20px 40px;
    }

    #calendar-inner {
      min-width: max-content;
      transform-origin: top left;
    }

    /* zoom controls */
    #zoom-controls {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 200;
      display: flex; flex-direction: column; gap: 6px;
    }
    .zoom-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(18,12,40,0.85);
      color: var(--cream);
      font-size: 1.1rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }
    .zoom-btn:hover {
      background: rgba(194,68,122,0.3);
      border-color: var(--magenta);
    }

    /* ── WEEK ROW ── */
    .week-row {
      display: flex; align-items: stretch;
      margin-bottom: 10px;
    }

    /* month label on left */
    .month-label {
      width: 64px; flex-shrink: 0;
      display: flex; align-items: center;
      padding-right: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--magenta);
      writing-mode: horizontal-tb;
      white-space: nowrap;
    }
    .month-label.blank { color: transparent; }

    /* day cells */
    .days-row {
      display: flex; gap: 6px;
    }

    .day-cell {
      width: 68px; flex-shrink: 0;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.09);
      background: var(--cell-blank);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }
    .day-cell:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.3); }
    .day-cell:active { transform: translateY(0); }

    /* weekend shimmer — subtle warm tint */
    .day-cell.weekend { background: rgba(245,166,35,0.07); }

    .day-cell .cell-top {
      padding: 6px 8px 4px;
      display: flex; align-items: baseline; gap: 4px;
    }
    .day-cell .day-name {
      font-size: 0.58rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgba(253,240,232,0.45);
    }
    .day-cell .day-num {
      font-size: 1.05rem; font-weight: 600;
      color: var(--cream); line-height: 1;
    }

    /* color bar at bottom of cell */
    .day-cell .cell-bar {
      height: 5px; margin-top: auto;
      background: transparent;
      transition: background 0.18s;
    }

    /* states */
    .day-cell[data-state="green"]  { border-color: var(--cell-green);  background: rgba(76,175,125,0.18); }
    .day-cell[data-state="green"]  .cell-bar { background: var(--cell-green); }
    .day-cell[data-state="yellow"] { border-color: var(--cell-yellow); background: rgba(245,200,66,0.15); }
    .day-cell[data-state="yellow"] .cell-bar { background: var(--cell-yellow); }
    .day-cell[data-state="red"]    { border-color: var(--cell-red);    background: rgba(224,82,82,0.16); }
    .day-cell[data-state="red"]    .cell-bar { background: var(--cell-red); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(18,12,40,0.95);
      border: 1px solid var(--sage);
      color: var(--cream); padding: 12px 24px;
      border-radius: 12px; font-size: 0.9rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.35s cubic-bezier(.16,1,.3,1);
      z-index: 999; pointer-events: none;
      backdrop-filter: blur(12px);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── MODAL ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(10,6,24,0.8); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #1e1242;
      border: 1px solid rgba(194,68,122,0.35);
      border-radius: 20px; padding: 36px 40px;
      max-width: 420px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
    }
    #modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--cream); margin-bottom: 10px;
    }
    #modal p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    #modal .modal-actions { display: flex; gap: 12px; justify-content: center; }
    .modal-btn {
      padding: 10px 24px; border-radius: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      border: none; transition: all 0.18s;
    }
    .modal-btn.primary {
      background: linear-gradient(135deg, var(--magenta), #8b1a8b);
      color: #fff;
      box-shadow: 0 0 16px rgba(194,68,122,0.4);
    }
    .modal-btn.primary:hover { opacity: 0.85; }
    .modal-btn.secondary {
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .modal-btn.secondary:hover { color: var(--cream); border-color: rgba(255,255,255,0.3); }

    #modal .success-icon {
      font-size: 2.5rem; margin-bottom: 12px;
    }

    /* loading / error */
    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      text-align: center; padding: 6px;
      font-size: 0.75rem; color: rgba(253,240,232,0.6);
      background: rgba(18,12,40,0.7);
      display: none;
    }
    #status-bar.visible { display: block; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-title">when to visit <span>kara</span></div>
  <div class="header-divider"></div>

  <span class="name-label">I am</span>
  <div class="name-chips" id="name-chips">
    <div class="chip active" data-name="Kara">Kara</div>
    <div class="chip" data-name="Makenna">Makenna</div>
    <div class="chip" data-name="Me">Me</div>
  </div>

  <div class="header-divider"></div>

  <span class="color-label">painting with</span>
  <div class="color-opts" id="color-opts">
    <div class="color-opt" data-color="blank">
      <span class="dot"></span>blank
    </div>
    <div class="color-opt" data-color="green">
      <span class="dot"></span>great ✓
    </div>
    <div class="color-opt active" data-color="yellow">
      <span class="dot"></span>maybe ~
    </div>
    <div class="color-opt" data-color="red">
      <span class="dot"></span>no ✗
    </div>
  </div>

  <div class="header-spacer"></div>

  <div class="progress-pill">
    <span class="progress-text" id="progress-text">0 / 0 filled</span>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <button id="submit-btn" disabled>Submit →</button>
</header>

<!-- ── CALENDAR ── -->
<div id="calendar-wrap">
  <div id="calendar-inner">
    <!-- generated by JS -->
  </div>
</div>

<!-- ── ZOOM ── -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
  <button class="zoom-btn" id="zoom-reset" title="Reset zoom">⊙</button>
  <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
</div>

<!-- ── MODAL ── -->
<div id="modal-overlay">
  <div id="modal">
    <div class="success-icon" id="modal-icon">🌅</div>
    <h2 id="modal-title">Submit your availability?</h2>
    <p id="modal-body">This will save your selections to the shared calendar. You can resubmit any time to update.</p>
    <div class="modal-actions" id="modal-actions">
      <button class="modal-btn secondary" id="modal-cancel">Not yet</button>
      <button class="modal-btn primary" id="modal-confirm">Yes, submit</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── STATUS BAR ── -->
<div id="status-bar" id="status-bar"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — fill these in after setting up Google Sheets
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
  SHEET_ID:    'YOUR_SHEET_ID_HERE',       // from the sheet URL
  API_KEY:     'YOUR_API_KEY_HERE',         // Google Sheets API key
  SHEET_NAME:  'Responses',                 // tab name in the sheet
  SCRIPT_URL:  'YOUR_APPS_SCRIPT_URL_HERE', // deployed Apps Script web app URL
};

// ═══════════════════════════════════════════════════════════════
//  DATE RANGE — 2 months starting July 1, 2025
// ═══════════════════════════════════════════════════════════════
const START = new Date(2025, 6, 1);  // July 1 2025
const END   = new Date(2025, 8, 0);  // Aug 31 2025  (Sep 0 = Aug 31)

// ─── State ───────────────────────────────────────────────────
let currentUser  = 'Kara';
let currentColor = 'yellow';
let zoom         = 1;

const selections = {}; // key: "YYYY-MM-DD" → 'blank'|'green'|'yellow'|'red'

// ─── Helpers ─────────────────────────────────────────────────
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function allDates() {
  const dates = [];
  const d = new Date(START);
  while (d <= END) {
    dates.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function weeksFrom(dates) {
  const weeks = [];
  let week = null;
  dates.forEach(d => {
    if (d.getDay() === 0 || !week) {
      week = [];
      // pad start of first week
      if (d.getDay() !== 0) {
        for (let i = 0; i < d.getDay(); i++) week.push(null);
      }
      weeks.push(week);
    }
    week.push(d);
  });
  // pad end of last week
  while (weeks[weeks.length-1].length < 7) weeks[weeks.length-1].push(null);
  return weeks;
}

// ─── Build Calendar ──────────────────────────────────────────
function buildCalendar() {
  const inner = document.getElementById('calendar-inner');
  inner.innerHTML = '';

  const dates  = allDates();
  const weeks  = weeksFrom(dates);

  // init selections
  dates.forEach(d => { if (!selections[isoDate(d)]) selections[isoDate(d)] = 'blank'; });

  let lastMonth = null;

  weeks.forEach((week, wi) => {
    const weekRow  = document.createElement('div');
    weekRow.className = 'week-row';

    // month label — show on first week of each month
    const monthLabel = document.createElement('div');
    monthLabel.className = 'month-label';

    const firstReal = week.find(d => d !== null);
    if (firstReal) {
      const m = firstReal.getMonth();
      if (m !== lastMonth) {
        monthLabel.textContent = MONTH_ABBR[m];
        lastMonth = m;
      } else {
        monthLabel.classList.add('blank');
        monthLabel.textContent = MONTH_ABBR[m]; // invisible but takes space
      }
    }
    weekRow.appendChild(monthLabel);

    const daysRow = document.createElement('div');
    daysRow.className = 'days-row';

    week.forEach(d => {
      const cell = document.createElement('div');
      if (!d) {
        cell.className = 'day-cell';
        cell.style.visibility = 'hidden';
      } else {
        const key = isoDate(d);
        const dow = d.getDay();
        cell.className = 'day-cell' + (dow === 0 || dow === 6 ? ' weekend' : '');
        cell.dataset.key = key;
        cell.dataset.state = selections[key] || 'blank';

        const top = document.createElement('div');
        top.className = 'cell-top';

        const dn = document.createElement('span');
        dn.className = 'day-name';
        dn.textContent = DAY_NAMES[dow];

        const num = document.createElement('span');
        num.className = 'day-num';
        num.textContent = d.getDate();

        top.appendChild(dn);
        top.appendChild(num);

        const bar = document.createElement('div');
        bar.className = 'cell-bar';

        cell.appendChild(top);
        cell.appendChild(bar);

        cell.addEventListener('click', () => onCellClick(cell, key));
      }
      daysRow.appendChild(cell);
    });

    weekRow.appendChild(daysRow);
    inner.appendChild(weekRow);
  });

  updateProgress();
}

// ─── Cell click ──────────────────────────────────────────────
function onCellClick(cell, key) {
  selections[key] = currentColor;
  cell.dataset.state = currentColor;
  updateProgress();
}

// ─── Progress ────────────────────────────────────────────────
function updateProgress() {
  const total  = Object.keys(selections).length;
  const filled = Object.values(selections).filter(v => v !== 'blank').length;
  const pct    = total ? (filled / total * 100) : 0;

  document.getElementById('progress-text').textContent = `${filled} / ${total} filled`;
  document.getElementById('progress-fill').style.width = pct + '%';

  const btn = document.getElementById('submit-btn');
  if (filled === total) {
    btn.disabled = false;
    btn.classList.add('ready');
  } else {
    btn.disabled = true;
    btn.classList.remove('ready');
  }
}

// ─── Name chips ──────────────────────────────────────────────
document.getElementById('name-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentUser = chip.dataset.name;
});

// ─── Color opts ──────────────────────────────────────────────
document.getElementById('color-opts').addEventListener('click', e => {
  const opt = e.target.closest('.color-opt');
  if (!opt) return;
  document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
  opt.classList.add('active');
  currentColor = opt.dataset.color;
});

// ─── Zoom ────────────────────────────────────────────────────
function applyZoom() {
  document.getElementById('calendar-inner').style.transform = `scale(${zoom})`;
}
document.getElementById('zoom-in').addEventListener('click', () => { zoom = Math.min(zoom + 0.1, 2); applyZoom(); });
document.getElementById('zoom-out').addEventListener('click', () => { zoom = Math.max(zoom - 0.1, 0.4); applyZoom(); });
document.getElementById('zoom-reset').addEventListener('click', () => { zoom = 1; applyZoom(); });

// ─── Submit ──────────────────────────────────────────────────
document.getElementById('submit-btn').addEventListener('click', () => {
  if (document.getElementById('submit-btn').disabled) return;
  document.getElementById('modal-overlay').classList.add('open');
});
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-confirm').addEventListener('click', submitData);

async function submitData() {
  document.getElementById('modal-actions').innerHTML = '<div style="color:var(--muted);font-size:0.9rem">Sending ✦</div>';

  // Build row: Name, then each date's selection in order
  const dates = allDates();
  const row   = [currentUser, new Date().toISOString(), ...dates.map(d => selections[isoDate(d)] || 'blank')];

  try {
    const res = await fetch(CONFIG.SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ row }),
      headers: { 'Content-Type': 'application/json' },
      mode: 'no-cors',
    });

    // no-cors means we can't read response, assume success
    showSuccess();
  } catch (err) {
    showError(err.message);
  }
}

function showSuccess() {
  document.getElementById('modal-icon').textContent  = '🌅';
  document.getElementById('modal-title').textContent = 'Submitted!';
  document.getElementById('modal-body').textContent  = `${currentUser}'s availability is saved. Thank you!`;
  document.getElementById('modal-actions').innerHTML = `<button class="modal-btn primary" onclick="document.getElementById('modal-overlay').classList.remove('open')">Close</button>`;
}

function showError(msg) {
  document.getElementById('modal-icon').textContent  = '⚠️';
  document.getElementById('modal-title').textContent = 'Something went wrong';
  document.getElementById('modal-body').textContent  = `Couldn't reach the sheet: ${msg}. Check the console and your CONFIG settings.`;
  document.getElementById('modal-actions').innerHTML = `<button class="modal-btn secondary" onclick="document.getElementById('modal-overlay').classList.remove('open')">Close</button>`;
}

function showToast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ─── Init ────────────────────────────────────────────────────
buildCalendar();
</script>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>When to Visit Kara</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sky: #1a1035;
      --deep: #120c28;
      --magenta: #c2447a;
      --amber: #f5a623;
      --coral: #ff7b5e;
      --sage: #7ec8a0;
      --cream: #fdf0e8;
      --muted: rgba(253, 240, 232, 0.55);
      --cell-blank: rgba(255, 255, 255, 0.07);
      --cell-green: #4caf7d;
      --cell-yellow: #f5c842;
      --cell-red: #e05252;
      --header-h: 72px;
    }

    html,
    body {
      height: 100%;
      background: var(--sky);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 120% 60% at 50% 110%, #3d1060 0%, transparent 70%),
        radial-gradient(ellipse 80% 40% at 80% 100%, #8b1a4a33 0%, transparent 60%),
        radial-gradient(ellipse 60% 30% at 20% 95%, #f5a62311 0%, transparent 60%);
      pointer-events: none;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(18, 12, 40, 0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(194, 68, 122, 0.28);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 0;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
      white-space: nowrap;
      padding-right: 20px;
      border-right: 1px solid rgba(253, 240, 232, 0.13);
      flex-shrink: 0;
    }

    .header-title span {
      color: var(--magenta);
    }

    .header-section {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 18px;
      border-right: 1px solid rgba(253, 240, 232, 0.13);
      height: 100%;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .name-chips {
      display: flex;
      gap: 5px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1.5px solid rgba(253, 240, 232, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      transition: all 0.18s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--magenta);
      color: var(--cream);
    }

    .chip.active {
      background: var(--magenta);
      border-color: var(--magenta);
      color: #fff;
      box-shadow: 0 0 12px rgba(194, 68, 122, 0.5);
    }

    .color-opts {
      display: flex;
      gap: 5px;
    }

    .color-opt {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 18px;
      cursor: pointer;
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.18s;
      white-space: nowrap;
    }

    .color-opt .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .color-opt:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: var(--cream);
    }

    .color-opt.active {
      color: var(--cream);
      background: rgba(255, 255, 255, 0.12);
    }

    .color-opt[data-color="blank"] .dot {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .color-opt[data-color="green"] .dot {
      background: var(--cell-green);
    }

    .color-opt[data-color="yellow"] .dot {
      background: var(--cell-yellow);
    }

    .color-opt[data-color="red"] .dot {
      background: var(--cell-red);
    }

    .color-opt[data-color="blank"].active {
      border-color: rgba(255, 255, 255, 0.4);
    }

    .color-opt[data-color="green"].active {
      border-color: var(--cell-green);
    }

    .color-opt[data-color="yellow"].active {
      border-color: var(--cell-yellow);
    }

    .color-opt[data-color="red"].active {
      border-color: var(--cell-red);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 18px;
      flex-shrink: 0;
    }

    .progress-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .progress-text {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .progress-bar-track {
      width: 64px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--magenta), var(--amber));
      transition: width 0.3s;
    }

    #submit-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      background: linear-gradient(135deg, var(--magenta), #8b1a8b);
      color: #fff;
      box-shadow: 0 0 20px rgba(194, 68, 122, 0.4);
      transition: all 0.2s;
      flex-shrink: 0;
      opacity: 0.4;
      cursor: not-allowed;
      white-space: nowrap;
    }

    #submit-btn.ready {
      opacity: 1;
      cursor: pointer;
    }

    #submit-btn.ready:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(194, 68, 122, 0.65);
    }

    /* CALENDAR */
    #calendar-wrap {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: 0;
      overflow: auto;
      padding: 32px 0 60px;
    }

    #calendar-inner {
      padding: 0 48px;
    }

    .month-block {
      margin-bottom: 40px;
    }

    .month-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--magenta);
      letter-spacing: 0.04em;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(194, 68, 122, 0.22);
    }

    .dow-header {
      display: grid;
      grid-template-columns: repeat(7, var(--cell-w, 80px));
      gap: var(--cell-gap, 7px);
      margin-bottom: 5px;
    }

    .dow-header span {
      text-align: center;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(253, 240, 232, 0.3);
    }

    .weeks-grid {
      display: flex;
      flex-direction: column;
      gap: var(--cell-gap, 7px);
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, var(--cell-w, 80px));
      gap: var(--cell-gap, 7px);
    }

    .day-cell {
      width: var(--cell-w, 80px);
      height: var(--cell-h, 58px);
      border-radius: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.09);
      background: var(--cell-blank);
      cursor: crosshair;
      transition: border-color 0.12s, box-shadow 0.12s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .day-cell.weekend {
      background: rgba(245, 166, 35, 0.06);
    }

    .day-cell.empty {
      visibility: hidden;
      pointer-events: none;
    }

    .day-cell.drag-preview {
      box-shadow: 0 0 0 2px rgba(253, 240, 232, 0.45) inset;
    }

    .day-cell .cell-top {
      padding: 6px 8px 3px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .day-cell .day-name {
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(253, 240, 232, 0.35);
    }

    .day-cell .day-num {
      font-size: 1rem;
      font-weight: 600;
      color: var(--cream);
      line-height: 1;
    }

    .day-cell .cell-bar {
      height: 5px;
      margin-top: auto;
      background: transparent;
      transition: background 0.15s;
    }

    .day-cell[data-state="green"] {
      border-color: var(--cell-green);
      background: rgba(76, 175, 125, 0.18);
    }

    .day-cell[data-state="green"] .cell-bar {
      background: var(--cell-green);
    }

    .day-cell[data-state="yellow"] {
      border-color: var(--cell-yellow);
      background: rgba(245, 200, 66, 0.15);
    }

    .day-cell[data-state="yellow"] .cell-bar {
      background: var(--cell-yellow);
    }

    .day-cell[data-state="red"] {
      border-color: var(--cell-red);
      background: rgba(224, 82, 82, 0.16);
    }

    .day-cell[data-state="red"] .cell-bar {
      background: var(--cell-red);
    }

    #drag-rect {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      border: 1.5px dashed rgba(253, 240, 232, 0.5);
      background: rgba(253, 240, 232, 0.05);
      border-radius: 4px;
      display: none;
    }

    /* ZOOM */
    #zoom-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .zoom-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(18, 12, 40, 0.85);
      color: var(--cream);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }

    .zoom-btn:hover {
      background: rgba(194, 68, 122, 0.3);
      border-color: var(--magenta);
    }

    #undo-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(18, 12, 40, 0.88);
      border: 1px solid rgba(253, 240, 232, 0.15);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 0.71rem;
      transition: transform 0.3s;
      pointer-events: none;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    #undo-hint.show {
      transform: translateX(-50%) translateY(0);
    }

    /* TOAST & MODAL */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(18, 12, 40, 0.95);
      border: 1px solid var(--sage);
      color: var(--cream);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: transform 0.35s cubic-bezier(.16, 1, .3, 1);
      z-index: 999;
      pointer-events: none;
      backdrop-filter: blur(12px);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(10, 6, 24, 0.8);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open {
      display: flex;
    }

    #modal {
      background: #1e1242;
      border: 1px solid rgba(194, 68, 122, 0.35);
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    #modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--cream);
      margin-bottom: 10px;
    }

    #modal p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    #modal .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-btn {
      padding: 10px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      transition: all 0.18s;
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, var(--magenta), #8b1a8b);
      color: #fff;
      box-shadow: 0 0 16px rgba(194, 68, 122, 0.4);
    }

    .modal-btn.primary:hover {
      opacity: 0.85;
    }

    .modal-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .modal-btn.secondary:hover {
      color: var(--cream);
      border-color: rgba(255, 255, 255, 0.3);
    }

    #modal .success-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-title">when to visit <span>kara</span></div>

    <div class="header-section">
      <span class="section-label">I am</span>
      <div class="name-chips" id="name-chips">
        <div class="chip active" data-name="Kara">Kara</div>
        <div class="chip" data-name="Makenna">Makenna</div>
        <div class="chip" data-name="Jacob">Jacob</div>
      </div>
    </div>

    <div class="header-section">
      <span class="section-label">painting with</span>
      <div class="color-opts" id="color-opts">
        <div class="color-opt" data-color="blank"><span class="dot"></span>blank</div>
        <div class="color-opt" data-color="green"><span class="dot"></span>great ✓</div>
        <div class="color-opt active" data-color="yellow"><span class="dot"></span>maybe ~</div>
        <div class="color-opt" data-color="red"><span class="dot"></span>no ✗</div>
      </div>
    </div>

    <div class="header-right">
      <div class="progress-pill">
        <span class="progress-text" id="progress-text">0 / 62 filled</span>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <button id="submit-btn" disabled>Submit →</button>
    </div>
  </header>

  <div id="calendar-wrap">
    <div id="calendar-inner"></div>
  </div>

  <div id="drag-rect"></div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-reset">⊙</button>
    <button class="zoom-btn" id="zoom-out">−</button>
  </div>

  <div id="undo-hint">⌘Z / Ctrl+Z to undo</div>

  <div id="modal-overlay">
    <div id="modal">
      <div class="success-icon" id="modal-icon">🌅</div>
      <h2 id="modal-title">Submit your availability?</h2>
      <p id="modal-body">This will save your selections to the shared calendar. You can resubmit any time to update.</p>
      <div class="modal-actions" id="modal-actions">
        <button class="modal-btn secondary" id="modal-cancel">Not yet</button>
        <button class="modal-btn primary" id="modal-confirm">Yes, submit</button>
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <script>
    const CONFIG = {
      SHEET_ID: '1O9Dl2f4hwtIBtRltd3oZjP3HHJhcAjgxVsOf0PNmq98',       // from the sheet URL
      API_KEY: 'AKfycbxIxCw0btFoeN103zS3OaCuHPH0uz6T1o8bfU1aM9GGjxs6_FexsYy1WzoeRAvUHUmUXw',         // Google Sheets API key
      SHEET_NAME: 'Responses',                 // tab name in the sheet
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxIxCw0btFoeN103zS3OaCuHPH0uz6T1o8bfU1aM9GGjxs6_FexsYy1WzoeRAvUHUmUXw/exec', // deployed Apps Script web app URL
    };

    const START = new Date(2025, 6, 1);
    const END = new Date(2025, 7, 31);
    const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const MONTH_FULL = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    let currentUser = 'Kara', currentColor = 'yellow', zoom = 1;
    const selections = {}, undoStack = [];

    function isoDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function allDates() {
      const out = [], d = new Date(START);
      while (d <= END) { out.push(new Date(d)); d.setDate(d.getDate() + 1); }
      return out;
    }
    function monthsInRange() {
      const seen = [], out = [];
      allDates().forEach(d => {
        const k = d.getFullYear() + '-' + d.getMonth();
        if (!seen.includes(k)) { seen.push(k); out.push({ year: d.getFullYear(), month: d.getMonth() }); }
      });
      return out;
    }

    function syncCellVars() {
      document.documentElement.style.setProperty('--cell-w', (80 * zoom) + 'px');
      document.documentElement.style.setProperty('--cell-h', (58 * zoom) + 'px');
      document.documentElement.style.setProperty('--cell-gap', (7 * zoom) + 'px');
    }

    function buildCalendar() {
      const inner = document.getElementById('calendar-inner');
      inner.innerHTML = '';
      allDates().forEach(d => { if (!selections[isoDate(d)]) selections[isoDate(d)] = 'blank'; });
      syncCellVars();

      monthsInRange().forEach(({ year, month }) => {
        const dates = allDates().filter(d => d.getFullYear() === year && d.getMonth() === month);

        const block = document.createElement('div'); block.className = 'month-block';
        const heading = document.createElement('div'); heading.className = 'month-heading';
        heading.textContent = MONTH_FULL[month] + ' ' + year;
        block.appendChild(heading);

        const dowRow = document.createElement('div'); dowRow.className = 'dow-header';
        DAY_NAMES.forEach(n => { const s = document.createElement('span'); s.textContent = n; dowRow.appendChild(s); });
        block.appendChild(dowRow);

        const grid = document.createElement('div'); grid.className = 'weeks-grid';
        const weeks = []; let week = null;
        dates.forEach(d => {
          if (!week || d.getDay() === 0) { week = new Array(7).fill(null); weeks.push(week); }
          week[d.getDay()] = d;
        });

        weeks.forEach(w => {
          const row = document.createElement('div'); row.className = 'week-row';
          w.forEach(d => {
            const cell = document.createElement('div');
            if (!d) { cell.className = 'day-cell empty'; }
            else {
              const key = isoDate(d), dow = d.getDay();
              cell.className = 'day-cell' + (dow === 0 || dow === 6 ? ' weekend' : '');
              cell.dataset.key = key; cell.dataset.state = selections[key] || 'blank';
              const top = document.createElement('div'); top.className = 'cell-top';
              const dn = document.createElement('span'); dn.className = 'day-name'; dn.textContent = DAY_NAMES[dow];
              const num = document.createElement('span'); num.className = 'day-num'; num.textContent = d.getDate();
              top.appendChild(dn); top.appendChild(num);
              const bar = document.createElement('div'); bar.className = 'cell-bar';
              cell.appendChild(top); cell.appendChild(bar);
            }
            row.appendChild(cell);
          });
          grid.appendChild(row);
        });

        block.appendChild(grid);
        inner.appendChild(block);
      });
      updateProgress();
    }

    function applyColor(cell, color, pushUndo = true) {
      const key = cell.dataset.key; if (!key) return;
      if (pushUndo) undoStack.push({ key, prev: selections[key] });
      selections[key] = color; cell.dataset.state = color;
    }

    function updateProgress() {
      const total = Object.keys(selections).length;
      const filled = Object.values(selections).filter(v => v !== 'blank').length;
      document.getElementById('progress-text').textContent = filled + ' / ' + total + ' filled';
      document.getElementById('progress-fill').style.width = (total ? (filled / total * 100) : 0) + '%';
      const btn = document.getElementById('submit-btn');
      btn.disabled = filled < total; btn.classList.toggle('ready', filled === total);
    }

    /* ── DRAG ── */
    let dragActive = false, dragStart = null;
    const dragRect = document.getElementById('drag-rect');

    function cellsFromRect(x1, y1, x2, y2) {
      const minX = Math.min(x1, x2), maxX = Math.max(x1, x2), minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
      return [...document.querySelectorAll('.day-cell:not(.empty)')].filter(c => {
        const r = c.getBoundingClientRect();
        return r.left < maxX && r.right > minX && r.top < maxY && r.bottom > minY;
      });
    }

    document.getElementById('calendar-wrap').addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      dragActive = true; dragStart = { x: e.clientX, y: e.clientY };
      dragRect.style.display = 'none'; e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragActive || !dragStart) return;
      const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
      if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      dragRect.style.display = 'block';
      dragRect.style.left = Math.min(e.clientX, dragStart.x) + 'px';
      dragRect.style.top = Math.min(e.clientY, dragStart.y) + 'px';
      dragRect.style.width = Math.abs(dx) + 'px';
      dragRect.style.height = Math.abs(dy) + 'px';
      document.querySelectorAll('.day-cell.drag-preview').forEach(c => c.classList.remove('drag-preview'));
      cellsFromRect(dragStart.x, dragStart.y, e.clientX, e.clientY).forEach(c => c.classList.add('drag-preview'));
    });

    document.addEventListener('mouseup', e => {
      if (!dragActive) return;
      dragActive = false; dragRect.style.display = 'none';
      document.querySelectorAll('.day-cell.drag-preview').forEach(c => c.classList.remove('drag-preview'));
      const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
      if (Math.abs(dx) < 4 && Math.abs(dy) < 4) {
        const cell = document.elementFromPoint(e.clientX, e.clientY)?.closest('.day-cell:not(.empty)');
        if (cell) { applyColor(cell, currentColor); updateProgress(); }
      } else {
        const cells = cellsFromRect(dragStart.x, dragStart.y, e.clientX, e.clientY);
        if (cells.length) {
          undoStack.push({ batch: cells.map(c => ({ key: c.dataset.key, prev: selections[c.dataset.key] })) });
          cells.forEach(c => applyColor(c, currentColor, false));
          updateProgress(); flashUndoHint();
        }
      }
      dragStart = null;
    });

    function flashUndoHint() {
      const h = document.getElementById('undo-hint'); h.classList.add('show');
      clearTimeout(flashUndoHint._t);
      flashUndoHint._t = setTimeout(() => h.classList.remove('show'), 2200);
    }

    /* ── UNDO ── */
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault(); if (!undoStack.length) return;
        const action = undoStack.pop();
        if (action.batch) {
          action.batch.forEach(({ key, prev }) => {
            selections[key] = prev;
            const cell = document.querySelector('[data-key="' + key + '"]');
            if (cell) cell.dataset.state = prev;
          });
        } else {
          selections[action.key] = action.prev;
          const cell = document.querySelector('[data-key="' + action.key + '"]');
          if (cell) cell.dataset.state = action.prev;
        }
        updateProgress();
      }
    });

    /* ── HEADER ── */
    document.getElementById('name-chips').addEventListener('click', e => {
      const chip = e.target.closest('.chip'); if (!chip) return;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active'); currentUser = chip.dataset.name;
    });
    document.getElementById('color-opts').addEventListener('click', e => {
      const opt = e.target.closest('.color-opt'); if (!opt) return;
      document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active'); currentColor = opt.dataset.color;
    });

    /* ── ZOOM ── */
    function applyZoom() { syncCellVars(); buildCalendar(); }
    document.getElementById('zoom-in').addEventListener('click', () => { zoom = Math.min(zoom + 0.15, 2); applyZoom(); });
    document.getElementById('zoom-out').addEventListener('click', () => { zoom = Math.max(zoom - 0.15, 0.4); applyZoom(); });
    document.getElementById('zoom-reset').addEventListener('click', () => { zoom = 1; applyZoom(); });

    /* ── SUBMIT ── */
    document.getElementById('submit-btn').addEventListener('click', () => {
      if (document.getElementById('submit-btn').disabled) return;
      document.getElementById('modal-overlay').classList.add('open');
    });
    document.getElementById('modal-cancel').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.remove('open');
    });
    document.getElementById('modal-confirm').addEventListener('click', submitData);

    async function submitData() {
      document.getElementById('modal-actions').innerHTML = '<div style="color:var(--muted);font-size:0.9rem">Sending ✦</div>';
      const dates = allDates();
      const row = [currentUser, new Date().toISOString(), ...dates.map(d => selections[isoDate(d)] || 'blank')];
      try {
        await fetch(CONFIG.SCRIPT_URL, {
          method: 'POST', body: JSON.stringify({ row }),
          headers: { 'Content-Type': 'application/json' }, mode: 'no-cors'
        });
        showSuccess();
      } catch (err) { showError(err.message); }
    }
    function showSuccess() {
      document.getElementById('modal-icon').textContent = '🌅';
      document.getElementById('modal-title').textContent = 'Submitted!';
      document.getElementById('modal-body').textContent = currentUser + "'s availability is saved. Thank you!";
      document.getElementById('modal-actions').innerHTML = '<button class="modal-btn primary" onclick="document.getElementById(\'modal-overlay\').classList.remove(\'open\')">Close</button>';
    }
    function showError(msg) {
      document.getElementById('modal-icon').textContent = '⚠️';
      document.getElementById('modal-title').textContent = 'Something went wrong';
      document.getElementById('modal-body').textContent = 'Could not reach the sheet: ' + msg;
      document.getElementById('modal-actions').innerHTML = '<button class="modal-btn secondary" onclick="document.getElementById(\'modal-overlay\').classList.remove(\'open\')">Close</button>';
    }

    buildCalendar();
  </script>
</body>

</html>
